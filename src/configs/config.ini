[paths]
# Project paths (relative to project root: constraint_modification/)
constraints_file = src/configs/constraints.txt
queries_file = src/configs/queries.json
env_file = .env

# Workspace and output structure
context_runs_root = context_runs
index_workspace = context_runs/index_workspace/insertion
hexaly_index_workspace = context_runs/index_workspace/hexaly

# Output directory structure (within each query run)
vanilla_baseline_dir = vanilla_baseline
temp_code_dir = temp_code
output_dir = output
policy_dir = policy
logs_dir = logs

# Log file names
main_agent_log = main_agent.log
agent_log = agent.log
panel_judgment_log = panel_judgment.json
llm_edit_log = llm_edit.txt
schedule_diff_log = schedule_diff.json
query_summary_log = QUERY_SUMMARY.txt

# Solver-specific directory names
insertion_solver_dir = insertion
hexaly_solver_dir = hexaly
insertion_temp_code_dir = temp_code_insertion
hexaly_temp_code_dir = temp_code_hexaly

# External package paths - can be overridden via environment variables
# SOLVERS_ROOT, SOLVERS_SRC, SOLVERS_POLICY_ROOT, SIM_ROOT, SIM_SRC
# SBR_VENV_PY, TOY_TEST_PATH - all support env var overrides

[indexing]
# Files from SOLVERS_POLICY_ROOT to index (insertion solver)
insertion_files = insert_heuristic.py, insertion_policy.py, policy_helpers.py

# Files from SOLVERS_POLICY_ROOT to index (hexaly solver)
hexaly_files = hexaly_planner_modular.py, hexaly_helper.py

[models]
# Default model for orchestrator (Main Agent) and single-turn agents (JA, EAA)
default_model = gemini-2.5-flash-lite

# N-version GA subagent models (comma-separated, fast to expensive)
nversion_models = gemini-2.5-flash-lite, gemini-2.5-flash-lite, gemini-2.5-flash-lite

# GA shorthand labels (same order as nversion_models)
nversion_labels = flash1, flash2, flash3

# Fallback chain: model -> fallback (on 403/429 rate-limit)
# Format: from1:to1, from2:to2, ...
fallback_chain = gemini-2.5-flash-lite:gemini-2.5-flash-lite-lite, gemini-2.5-flash-lite-lite:gemini-3-flash-preview
